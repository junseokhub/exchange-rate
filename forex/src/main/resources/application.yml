spring:
  application:
    name: forex

  datasource:
    url: jdbc:h2:mem:forexdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  batch:
    job:
      enabled: false

logging:
  level:
    com.dev.forex: DEBUG
    org.springframework.batch: INFO