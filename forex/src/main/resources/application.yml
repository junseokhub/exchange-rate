spring:
  application:
    name: forex

  datasource:
    url: jdbc:h2:mem:forexdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  batch:
    job:
      enabled: false

logging:
  level:
    com.dev.forex: DEBUG
    org.springframework.batch: INFO

external:
  api:
    url: ${EXTERNAL_API_URL:https://open.er-api.com/v6/latest/KRW}

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

resilience4j:
  circuitbreaker:
    instances:
      exchangeRate:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      exchangeRate:
        max-attempts: 3
        wait-duration: 2s